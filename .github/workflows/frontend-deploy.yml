name: Deploy Frontend to S3 + CloudFront

on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write     # OIDC 필수
  contents: read

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: olive-live-frontend-dev-065227443107
  CF_DIST_ID: E1MGBIG68DNKUW
  FRONTEND_DIR: frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      # ✅ (핵심) Build 단계에 VITE_* 주입
      - name: Build
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          # ===== API =====
          VITE_API_BASE_URL: https://d21hmdoocq4tl0.cloudfront.net
          VITE_ORIGIN_HEADER_NAME: x-olive-origin
          VITE_ORIGIN_HEADER_VALUE: olive-dev-only-9f3a2c

          # ===== Datadog RUM =====
          VITE_DD_RUM_ENABLED: "true"
          VITE_DD_SITE: ap1.datadoghq.com
          VITE_DD_ENV: dev
          VITE_DD_SERVICE: olive-live-frontend
          VITE_DD_APPLICATION_ID: 7c7f1c1b-4000-4fcf-90d7-dfa7be4f5134
          VITE_DD_CLIENT_TOKEN: pub68fd01f192f125059c29e4d2af26a8ec
          VITE_DD_SESSION_SAMPLE_RATE: "100"
          VITE_DD_SESSION_REPLAY_SAMPLE_RATE: "20"

          # 버전
          VITE_APP_VERSION: ${{ github.sha }}
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::065227443107:role/olive-live-frontend-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      # 1) 해시된 정적 자산은 길게 캐시해도 안전
      - name: Sync assets to S3
        run: |
          aws s3 sync "${{ env.FRONTEND_DIR }}/dist" "s3://${{ env.S3_BUCKET }}" \
            --delete \
            --exclude "index.html"

      # 2) index.html은 no-cache
      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp "${{ env.FRONTEND_DIR }}/dist/index.html" "s3://${{ env.S3_BUCKET }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ env.CF_DIST_ID }}" \
            --paths "/*"
